<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium E-Library exploring modern reading.">
    <title>E-Library | Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="index-page">
    <div class="glow-bg"></div>
    
    <nav>
        <div class="logo">E-Library.</div>
        <div class="nav-links" id="nav-links">
            <!-- Dynamically populated by JS -->
        </div>
    </nav>

    <header class="hero">
        <div class="container glass-panel" style="max-width: 800px; border:none; box-shadow:none; background:transparent">
            <h1>Unlock the World of Knowledge.</h1>
            <p>Experience a glamorous, seamless digital library system. Borrow your favorite novels, academic texts, and science fictions with a single click. Welcome to the future of reading.</p>
            <a href="#catalog-section" class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem 2.5rem;">Explore Catalog</a>
        </div>
    </header>

    <section id="catalog-section" class="container mt-2 mb-2">
        <h2 class="text-center" style="font-size: 2.5rem; margin-bottom: 3rem;">Featured Indian Books</h2>
        <div class="grid" id="catalog">
            <!-- Dynamically populated books -->
        </div>
    </section>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
